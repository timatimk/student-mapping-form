<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דשבורד מיפוי תלמידים</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .class-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .class-card {
      min-height: 120px;
      padding: 18px;
      border-radius: 16px;
      background: #f8fbff;
      border: 1px solid rgba(0, 90, 180, 0.12);
      box-shadow: 0 8px 20px rgba(37, 82, 151, 0.06);
      text-decoration: none;
      color: #003168;
    }
    .class-card:hover {
      transform: translateY(-2px);
      border-color: rgba(0, 90, 180, 0.22);
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <img src="logo.png" alt="ברנקו וייס - חינוך משנה חברה" class="logo" />
      <h1>דשבורד מיפוי תלמידים</h1>
      <p>סקירה מהירה של ההערכות שנשמרו בדפדפן.</p>
    </header>

    <section class="card class-grid-card">
      <h2>כיתות</h2>
      <div class="class-grid" id="classGrid"></div>
    </section>

    <section class="card filters advanced-filters">
      <h2>סינון נתונים</h2>
      <div class="filter-row">
        <label for="filterClass">כיתה / מחנכת</label>
        <select id="filterClass"><option value="all">הכל</option></select>
      </div>
      <div class="filter-row">
        <label for="filterCommunication">ציר התקשורת</label>
        <select id="filterCommunication">
          <option value="all">הכל</option>
          <option value="3">ירוק</option>
          <option value="2">צהוב</option>
          <option value="1">אדום</option>
        </select>
      </div>
      <div class="filter-row">
        <label for="filterWellbeing">ציר הרווחה</label>
        <select id="filterWellbeing">
          <option value="all">הכל</option>
          <option value="green">ירוק</option>
          <option value="yellow">צהוב</option>
          <option value="red">אדום</option>
        </select>
      </div>
      <div class="filter-row">
        <label for="tableSearch">חיפוש חכם</label>
        <input id="tableSearch" type="text" placeholder="חפש תלמיד, כיתה, מחנכת, הערות..." />
      </div>
      <button id="exportBtn" class="primary-btn">ייצא ל-CSV</button>
    </section>

    <section class="card comparison-section">
      <h2>השוואת כיתות</h2>
      <div class="comparison-grid" id="comparisonGrid"></div>
    </section>

    <section class="card table-card">
      <h2>טבלת נתונים גולמיים</h2>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th class="sortable" data-key="className">כיתה / מחנכת</th>
              <th class="sortable" data-key="studentName">תלמיד/ה</th>
              <th class="sortable" data-key="date">תאריך</th>
              <th class="sortable" data-key="communicationLevel">תקשורת</th>
              <th class="sortable" data-key="wellbeingLevel">רווחה</th>
              <th class="sortable" data-key="familyStatus">מעטפת משפחתית</th>
              <th class="sortable" data-key="alerts">נורות אדומות</th>
              <th class="sortable" data-key="strengths">כוחות</th>
            </tr>
          </thead>
          <tbody id="submissionsTable"></tbody>
        </table>
      </div>
    </section>

    <section class="card charts-section">
      <h2>התפלגות כללית</h2>
      <div class="distribution-grid" id="distributionGrid"></div>
    </section>
  </main>
  <script src="dashboard.js"></script>
</body>
</html>
